body:
  text: 嘉祐雜誌小説家𩔖一雜事之屬提要臣等謹案嘉祐雜誌一卷宋江休復撰休復字隣㡬開封陳留人舉進士充集賢校理謫監蔡州税後復官歴刑部郎中脩起居注卒於官事蹟具宋史文苑傳休復有文集二十卷今佚不傳惟此書存文獻通考及宋史藝文志皆作三卷而稗海唐宋叢書皆不分卷明胡應麟筆叢云江隣㡬雜志宋人極推之今不傳略見説郛然説郛所載止十頁而稗海唐宋叢書與此抄本皆三倍于説郛應麟殆偶未見也歐陽脩作休復墓誌云休復歿于嘉祐五年而是書屢紀己亥冬秋之事即休復未歿之前一年年月亦皆相應惟書中記其奉使事宋史本傳與墓誌皆不載又刻本皆題云臨川江休復而史與墓誌皆云陳留人頗為舛異葢休復奉使雄州未嘗出境不過館伴之常事故墓誌本傳皆不書而刻本標題又後人所妄加爾其書皆記雜事故宋志列之小説家姚寛西溪叢語摘其象膽隨四時一條誤以酉陽雜俎為山海經朱翌猗覺寮雜記摘其壓角一條誤以丞相為直閣以坐於榻為立於褥是誠偶誤然休復所與交游率皆勝流耳濡目染具有端緒究非委巷俗談可比也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:eb5890c0e947bdf72e6d1e1745d1ae5f88c98f791fbe57286e902a779e0f389b
