body:
  text: 嘉祐雜志小說家類一雜事之屬提要臣等謹案嘉祐雜志一卷宋江休復撰休復字鄰幾開封陳留人舉進士充集賢校理謫監蔡州稅後復官歷刑部郎中修起居注卒於官事蹟具宋史文苑傳休復有文集二十卷今佚不傳惟此書存文獻通考及宋史藝文志皆作三卷而稗海唐宋叢書皆不分卷明胡應麟筆叢云江鄰幾雜志宋人極推之今不傳略見說郛然說郛所載止十頁而稗海唐宋叢書與此抄本皆三倍于說郛應麟殆偶未見也歐陽修作休復墓志云休復歿于嘉祐五年而是書屢紀己亥冬秋之事即休復未歿之前一年年月亦皆相應惟書中記其奉使事宋史本傳與墓志皆不載又刻本皆題云臨川江休復而史與墓志皆云陳留人頗為舛異蓋休復奉使雄州未嘗出境不過館伴之常事故墓志本傳皆不書而刻本標題又後人所妄加爾其書皆記雜事故宋志列之小說家姚寬西溪叢語摘其象膽隨四時一條誤以酉陽雜俎為山海經朱翌猗覺寮雜記摘其壓角一條誤以丞相為直閣以坐於榻為立於褥是誠偶誤然休復所與交游率皆勝流耳濡目染具有端緒究非委巷俗談可比也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:080a68a3af769df0e4e122b81b59061d73fc6501010192497daeb4d22ec0e4f6
